<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PrajaPulse ಪ್ರಜಾ ಪಲ್ಸ್ — Bangalore Civic Intelligence</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- React + ReactDOM -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<!-- Babel for JSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

  :root {
    --green:       #1D9E75;
    --green-light: #e6f7f2;
    --green-dark:  #0f6b4f;
    --green-mid:   #d0f0e6;
    --amber:       #BA7517;
    --amber-light: #fef3dc;
    --red:         #C0392B;
    --red-light:   #fdecea;
    --blue:        #185FA5;
    --blue-light:  #e8f0fa;
    --coral:       #D85A30;
    --coral-light: #fdf0eb;
    --bg:          #F2F1ED;
    --surface:     #FFFFFF;
    --surface2:    #F8F7F4;
    --border:      #E4E0D8;
    --border-strong:#C8C4BC;
    --text:        #17161A;
    --text2:       #3D3B38;
    --muted:       #7A776F;
    --muted2:      #A09D96;
    --nav-h:       58px;
    --sidebar-w:   310px;
    --alert-h:     0px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; -webkit-font-smoothing: antialiased; }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

  /* ── NAV ── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: var(--nav-h);
    background: #0F0E0C;
    display: flex; align-items: center; gap: 14px; padding: 0 18px;
    border-bottom: 1px solid #222;
  }
  .nav-logo { display:flex; align-items:center; gap:9px; text-decoration:none; flex-shrink:0; }
  .nav-logo-mark {
    width:32px; height:32px; background:var(--green); border-radius:7px;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-logo-mark svg { color:#fff; }
  .nav-logo-text h1 { color:#fff; font-size:16px; font-weight:800; letter-spacing:-0.4px; line-height:1; }
  .nav-logo-text small { color:var(--green); font-size:9.5px; letter-spacing:1.2px; font-family:'DM Sans'; opacity:.9; }
  .nav-divider { width:1px; height:22px; background:#2a2a2a; flex-shrink:0; }
  .nav-search {
    flex:1; max-width:440px; margin:0 auto;
    position:relative;
  }
  .nav-search input {
    width:100%; height:34px; border-radius:7px; border:1px solid #2a2a2a;
    background:#161614; color:#e0ddd6; padding:0 12px 0 34px;
    font-family:'DM Sans'; font-size:13px; outline:none;
    transition: border-color .18s, background .18s;
  }
  .nav-search input::placeholder { color:#4a4845; }
  .nav-search input:focus { border-color:var(--green); background:#0f0e0c; }
  .nav-search .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#4a4845; }
  .search-dropdown {
    position:absolute; top:40px; left:0; right:0; background:var(--surface);
    border:1px solid var(--border); border-radius:9px; overflow:hidden;
    box-shadow:0 12px 32px rgba(0,0,0,.14); z-index:200;
  }
  .search-result-item {
    padding:9px 14px; cursor:pointer; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid var(--border); transition:background .12s;
  }
  .search-result-item:last-child { border-bottom:none; }
  .search-result-item:hover { background:var(--surface2); }
  .nav-actions { display:flex; gap:7px; align-items:center; margin-left:auto; }
  .btn {
    display:inline-flex; align-items:center; gap:6px; padding:0 13px; height:32px;
    border-radius:7px; font-size:12.5px; font-weight:500; cursor:pointer;
    border:none; transition: all .15s; font-family:'DM Sans'; white-space:nowrap;
  }
  .btn-primary { background:var(--green); color:#fff; }
  .btn-primary:hover { background:var(--green-dark); }
  .btn-ghost { background:transparent; color:#aaa; border:1px solid #2a2a2a; }
  .btn-ghost:hover { border-color:#555; color:#fff; background:#1a1a18; }
  .nav-tab {
    color:#666; font-size:12.5px; cursor:pointer; padding:4px 9px;
    border-radius:6px; transition:all .15s; font-family:'DM Sans'; font-weight:500;
  }
  .nav-tab:hover { color:#ccc; background:#1c1c1a; }
  .nav-tab.active { color:#fff; background:#222; }

  /* ── ALERT BANNER ── */
  .alert-banner {
    position:fixed; top:var(--nav-h); left:0; right:0; z-index:900;
    background:#E8940A; color:#1A0800; padding:9px 20px;
    display:flex; align-items:center; gap:10px; font-size:13px; font-weight:500;
    transform:translateY(-100%); transition:transform .28s ease; height:42px;
  }
  .alert-banner.visible { transform:translateY(0); --alert-h:42px; }
  .alert-pulse { width:8px; height:8px; border-radius:50%; background:#C0392B; flex-shrink:0;
    animation:pulse-dot 1.2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(1.5);} }
  .alert-close { margin-left:auto; cursor:pointer; background:rgba(0,0,0,.12); border:none;
    width:20px;height:20px;border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:12px; }

  /* ── MAIN LAYOUT ── */
  .app-body {
    display:flex; height:100vh;
    padding-top: calc(var(--nav-h) + var(--alert-h));
    transition: padding-top .28s;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width:var(--sidebar-w); flex-shrink:0; background:var(--surface);
    border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column;
  }
  .sidebar::-webkit-scrollbar { width:4px; }
  .sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  /* Stats top row */
  .stats-row {
    display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border);
    border-bottom:1px solid var(--border);
  }
  .stat-card { background:var(--surface); padding:13px 15px; }
  .stat-num { font-family:'Syne'; font-size:24px; font-weight:800; line-height:1.1; }
  .stat-label { font-size:10px; color:var(--muted2); margin-top:3px; text-transform:uppercase; letter-spacing:.6px; font-weight:600; }

  .sidebar-section { padding:14px 16px; border-bottom:1px solid var(--border); }
  .sidebar-title {
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px;
    color:var(--muted2); margin-bottom:10px; display:flex; align-items:center; gap:6px;
  }

  /* filter pills */
  .filter-pills { display:flex; flex-wrap:wrap; gap:5px; }
  .pill {
    padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:500; cursor:pointer;
    border:1px solid var(--border); background:var(--surface); color:var(--muted);
    transition:all .14s;
  }
  .pill.active { border-color:currentColor; }
  .pill-water.active  { color:var(--blue);  background:var(--blue-light);  border-color:var(--blue); }
  .pill-roads.active  { color:var(--coral); background:var(--coral-light); border-color:var(--coral); }
  .pill-power.active  { color:var(--amber); background:var(--amber-light); border-color:var(--amber); }
  .pill-garbage.active{ color:#4A6B20;      background:#eef6e0;            border-color:#4A6B20; }
  .pill-all.active    { color:var(--text);  background:var(--bg);          border-color:var(--border-strong); }
  .pill-resolved.active { color:var(--green-dark); background:var(--green-light); border-color:var(--green); }

  /* MLA cards */
  .mla-card {
    border:1px solid var(--border); border-radius:10px; padding:11px 13px; margin-bottom:7px;
    cursor:pointer; transition:all .14s; background:var(--surface);
  }
  .mla-card:hover { border-color:var(--green); background:var(--green-light); }
  .mla-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .mla-name { font-weight:700; font-size:13.5px; font-family:'Syne'; line-height:1.2; }
  .mla-ward { font-size:11px; color:var(--muted); margin-top:2px; }
  .score-chip {
    font-family:'Syne'; font-weight:800; font-size:14px;
    padding:3px 8px; border-radius:6px; flex-shrink:0;
  }
  .score-bar-wrap { margin-top:9px; height:4px; background:var(--bg); border-radius:3px; overflow:hidden; }
  .score-bar { height:100%; border-radius:3px; transition:width .4s ease; }

  /* live feed */
  .feed-item {
    display:flex; gap:9px; padding:9px 0; border-bottom:1px solid var(--border);
    align-items:flex-start;
  }
  .feed-item:last-child { border-bottom:none; }
  .feed-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:5px; }
  .feed-text { font-size:12px; line-height:1.45; color:var(--text2); }
  .feed-meta { font-size:10.5px; color:var(--muted2); margin-top:3px; }
  .cat-badge {
    display:inline-block; padding:1px 6px; border-radius:8px; font-size:10px;
    font-weight:700; text-transform:uppercase; letter-spacing:.4px;
  }

  /* ── MAP ── */
  .map-area { flex:1; position:relative; }
  #map { width:100%; height:100%; }

  /* Cluster popup */
  .cluster-label {
    background:rgba(24,95,165,.9); color:#fff; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne'; font-weight:800; border:2px solid #fff;
    box-shadow:0 2px 10px rgba(0,0,0,.25);
  }

  /* ── MODAL ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:2000;
    display:flex; align-items:center; justify-content:center; padding:20px;
    backdrop-filter:blur(4px);
  }
  .modal {
    background:var(--surface); border-radius:16px; width:100%; max-width:500px;
    max-height:90vh; overflow-y:auto; box-shadow:0 24px 64px rgba(0,0,0,.22);
    border:1px solid var(--border);
  }
  .modal-header {
    padding:18px 22px 14px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-title { font-family:'Syne'; font-size:17px; font-weight:800; }
  .modal-body { padding:18px 22px; }
  .modal-close { cursor:pointer; background:var(--bg); border:none; width:28px; height:28px;
    border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:14px; color:var(--muted); }
  .modal-close:hover { background:var(--border); }

  .cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:14px; }
  .cat-btn {
    padding:12px; border-radius:10px; border:1.5px solid var(--border); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:5px; transition:all .14s;
    font-family:'DM Sans'; font-size:12.5px; font-weight:500; background:var(--surface);
    color:var(--text2);
  }
  .cat-btn:hover { border-color:var(--border-strong); background:var(--surface2); }
  .cat-btn.selected-water  { border-color:var(--blue);  background:var(--blue-light);  color:var(--blue); }
  .cat-btn.selected-roads  { border-color:var(--coral); background:var(--coral-light); color:var(--coral); }
  .cat-btn.selected-power  { border-color:var(--amber); background:var(--amber-light); color:var(--amber); }
  .cat-btn.selected-garbage{ border-color:#4A6B20;      background:#eef6e0;            color:#4A6B20; }

  .form-group { margin-bottom:13px; }
  .form-label { display:block; font-size:11px; font-weight:600; margin-bottom:4px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }
  .form-control {
    width:100%; padding:9px 11px; border:1.5px solid var(--border); border-radius:8px;
    font-family:'DM Sans'; font-size:13.5px; background:var(--surface); color:var(--text);
    outline:none; transition:border-color .18s; resize:vertical;
  }
  .form-control:focus { border-color:var(--green); }
  select.form-control { appearance:none; cursor:pointer; }

  .ai-result {
    background:var(--green-light); border:1px solid var(--green);
    border-radius:8px; padding:11px; margin:10px 0; display:flex; gap:10px; align-items:center;
  }
  .ai-result-icon { font-size:18px; }
  .ai-result-detail { font-size:12px; }
  .ai-result-detail strong { display:block; font-size:12.5px; color:var(--green-dark); font-weight:700; }

  .spinner {
    display:inline-block; width:15px; height:15px; border:2px solid rgba(29,158,117,.25);
    border-top-color:var(--green); border-radius:50%; animation:spin .65s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── WARD PAGE ── */
  .ward-page {
    position:fixed; inset:0; background:var(--bg); z-index:1500;
    overflow-y:auto; padding-top:var(--nav-h);
  }
  .ward-page-inner { max-width:860px; margin:0 auto; padding:28px 22px 40px; }
  .ward-badge {
    display:inline-flex; align-items:center; gap:6px; background:var(--text); color:#fff;
    padding:5px 12px; border-radius:7px; font-family:'Syne'; font-weight:700; font-size:12.5px;
    margin-bottom:6px; letter-spacing:.2px;
  }
  .ward-name-h { font-family:'Syne'; font-size:32px; font-weight:800; line-height:1.05; margin-bottom:4px; }
  .ward-pincode { color:var(--muted); font-size:13.5px; }

  .mla-big-card {
    background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px;
    display:flex; gap:18px; align-items:center; margin:18px 0;
  }
  .score-circle {
    width:76px; height:76px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne'; font-weight:800; font-size:24px;
    border:3.5px solid currentColor;
  }
  .mla-big-info { flex:1; }
  .mla-big-name { font-family:'Syne'; font-size:20px; font-weight:800; }
  .mla-big-ward { color:var(--muted); font-size:12.5px; margin-top:2px; }
  .mla-promises-count { font-size:12.5px; color:var(--green-dark); font-weight:600; margin-top:5px; }

  .ward-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-bottom:18px; }
  .ward-stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:13px;
    text-align:center; transition:border-color .14s;
  }
  .ward-stat-num { font-family:'Syne'; font-size:26px; font-weight:800; line-height:1.1; }
  .ward-stat-label { font-size:10px; color:var(--muted2); text-transform:uppercase; letter-spacing:.6px; margin-top:2px; font-weight:600; }

  #ward-map { width:100%; height:240px; border-radius:12px; border:1px solid var(--border); margin-bottom:18px; }

  .promises-list { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:18px; }
  .promise-item { padding:13px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); gap:12px; }
  .promise-item:last-child { border-bottom:none; }
  .promise-text { font-size:13.5px; flex:1; color:var(--text2); }
  .status-badge { padding:3px 10px; border-radius:20px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; flex-shrink:0; }
  .done    { background:var(--green-light); color:var(--green-dark); }
  .partial { background:var(--amber-light); color:var(--amber); }
  .broken  { background:var(--red-light);   color:var(--red); }

  /* ── WARDS PAGE ── */
  .wards-page {
    position:fixed; inset:0; background:var(--bg); z-index:1500;
    overflow-y:auto; padding-top:var(--nav-h);
  }
  .wards-page-inner { max-width:900px; margin:0 auto; padding:28px 22px; }
  .wards-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px; }
  .ward-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:15px;
    cursor:pointer; transition:all .14s;
  }
  .ward-card:hover { border-color:var(--green); box-shadow:0 4px 18px rgba(29,158,117,.08); transform:translateY(-1px); }
  .ward-num-badge {
    background:var(--bg); border-radius:5px; padding:2px 7px; font-size:10.5px;
    font-weight:700; color:var(--muted2); display:inline-block; margin-bottom:5px; letter-spacing:.3px;
  }
  .ward-card-name { font-family:'Syne'; font-weight:800; font-size:15px; margin-bottom:3px; }
  .ward-card-mla { font-size:11.5px; color:var(--muted); }
  .ward-card-footer { margin-top:9px; display:flex; justify-content:space-between; align-items:center; }
  .ward-card-pin { font-size:11px; color:var(--muted2); }

  .api-key-banner {
    background:var(--amber-light); border:1px solid var(--amber); border-radius:8px; padding:9px 13px;
    font-size:12px; display:flex; gap:8px; align-items:center; margin-bottom:13px;
  }

  /* ── FAB ── */
  .fab {
    position:fixed; bottom:22px; right:22px; z-index:500;
    width:50px; height:50px; border-radius:50%; background:var(--green); color:#fff;
    border:none; cursor:pointer; font-size:24px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 18px rgba(29,158,117,.38); transition:all .18s;
  }
  .fab:hover { background:var(--green-dark); transform:scale(1.06); }

  /* Key input row */
  .key-row { display:flex; gap:8px; margin-bottom:4px; }
  .key-row input { flex:1; }
  .key-row .btn { flex-shrink:0; background:var(--text); color:#fff; }

  /* ── UPVOTE BUTTON ── */
  .upvote-btn {
    display:inline-flex; align-items:center; gap:4px; padding:2px 9px;
    border-radius:20px; font-size:11px; font-weight:600; cursor:pointer;
    border:1px solid var(--border); background:var(--surface2); color:var(--muted);
    transition:all .14s; font-family:'DM Sans';
  }
  .upvote-btn:hover { border-color:var(--green); color:var(--green); background:var(--green-light); }
  .upvote-btn.voted { border-color:var(--green); color:var(--green-dark); background:var(--green-light); }
  .upvote-btn.voted:hover { border-color:var(--red); color:var(--red); background:var(--red-light); }

  /* ── MLA RESPONSE LOG ── */
  .response-log {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; margin-bottom:18px;
  }
  .response-item {
    padding:12px 16px; border-bottom:1px solid var(--border); display:flex; gap:11px;
  }
  .response-item:last-child { border-bottom:none; }
  .response-avatar {
    width:30px; height:30px; border-radius:50%; background:var(--blue-light);
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
    color:var(--blue); flex-shrink:0;
  }
  .response-body { flex:1; }
  .response-author { font-size:12px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .official-badge { background:var(--blue-light); color:var(--blue); padding:1px 6px; border-radius:7px; font-size:9.5px; font-weight:700; letter-spacing:.3px; text-transform:uppercase; }
  .response-text { font-size:12px; color:var(--muted); margin-top:3px; line-height:1.45; }
  .response-time { font-size:10px; color:var(--muted2); margin-top:3px; }

  /* ── WARD HEALTH LEGEND ── */
  .map-legend {
    position:absolute; bottom:20px; left:20px; z-index:400;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:10px 13px; font-size:11px; box-shadow:0 2px 14px rgba(0,0,0,.09);
  }
  .legend-title { font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted2); margin-bottom:7px; }
  .legend-row { display:flex; align-items:center; gap:7px; margin-bottom:4px; font-size:11.5px; color:var(--text2); }
  .legend-row:last-child { margin-bottom:0; }
  .legend-swatch { width:11px; height:11px; border-radius:3px; flex-shrink:0; opacity:.8; }

  /* ── DISPUTED BADGE ── */
  .disputed-badge {
    background:#fff3e0; color:#c45500; border:1px solid #ffa040;
    padding:1px 7px; border-radius:8px; font-size:10px; font-weight:700;
    text-transform:uppercase; letter-spacing:.3px;
  }

  /* ── COMPLAINT DETAIL PANEL (slide-in from right) ── */
  .complaint-panel {
    position:fixed; top:var(--nav-h); right:0; bottom:0; width:380px; z-index:800;
    background:var(--surface); border-left:1px solid var(--border);
    overflow-y:auto; display:flex; flex-direction:column;
    box-shadow:-8px 0 32px rgba(0,0,0,.1);

// ─── UTILS ───
function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function detectClusters(complaints){
  const recent = complaints.filter(c=>
    (c.status==="open"||c.status==="in_progress") &&
    (Date.now()-new Date(c.timestamp).getTime()) < 48*3600*1000
  );
  const groups = {};
  recent.forEach(c=>{ (groups[c.category]||(groups[c.category]=[])).push(c); });
  const clusters=[];
  const authority={water:"BWSSB",roads:"BBMP",garbage:"BBMP",power:"BESCOM"};
  Object.entries(groups).forEach(([cat,comps])=>{
    if(comps.length<5) return;
    const used=new Set();
    comps.forEach((c,i)=>{
      if(used.has(i)) return;
      const members=[c];
      comps.forEach((d,j)=>{
        if(i===j||used.has(j)) return;
        if(haversineKm(c.lat,c.lng,d.lat,d.lng)<=2){ members.push(d); used.add(j); }
      });
      used.add(i);
      if(members.length>=5){
        const avgLat=members.reduce((s,m)=>s+m.lat,0)/members.length;
        const avgLng=members.reduce((s,m)=>s+m.lng,0)/members.length;
        const ward=members[0].ward_name;
        clusters.push({
          category:cat, count:members.length,
          center_lat:avgLat, center_lng:avgLng,
          complaint_ids:members.map(m=>m.id),
          authority:authority[cat]||"BBMP",
          alert_message:`${members.length} ${cat} complaints in ${ward} in 48h — ${authority[cat]||"BBMP"} auto-notified`,
        });
      }
    });
  });
  return clusters;
}
function scoreColor(s){ return s>=71?"green":s>=41?"amber":"red"; }
function scoreHex(s){ return s>=71?"#1D9E75":s>=41?"#BA7517":"#C0392B"; }
function catColor(cat){ return {water:"#185FA5",roads:"#D85A30",power:"#BA7517",garbage:"#5C7A2D",resolved:"#1D9E75"}[cat]||"#888"; }
function catBg(cat){ return {water:"#e8f0fa",roads:"#fdf0eb",power:"#fef3dc",garbage:"#f0f7e6",resolved:"#e6f7f2"}[cat]||"#f0f0f0"; }
function catIcon(cat){ return {water:"💧",roads:"🚧",power:"⚡",garbage:"🗑️"}[cat]||"📍"; }
function timeAgo(ts){
  const s=(Date.now()-new Date(ts).getTime())/1000;
  if(s<60) return "just now";
  if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}
function searchWards(q,wards){
  if(!q||q.length<2) return [];
  const ql=q.toLowerCase();
  return wards.filter(w=>
    String(w.ward_number)===q ||
    w.pincode===q ||
    w.ward_name.toLowerCase().includes(ql) ||
    w.mla.toLowerCase().includes(ql)
  ).slice(0,5);
}

// ─── CLAUDE API CLASSIFIER ───
async function classifyComplaint(text, apiKey){
  if(!apiKey) return {category:"other",urgency:"medium",ward_hint:null,language:"english"};
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:150,
        system:`You are a Bangalore civic complaint classifier. Respond ONLY with a valid JSON object — no markdown, no explanation:
{"category":"water"|"roads"|"power"|"garbage"|"other","urgency":"low"|"medium"|"high","ward_hint":"ward name or null","language":"english"|"kannada"|"hinglish"}`,
        messages:[{role:"user",content:text}]
      })
    });
    const data=await res.json();
    const txt=data.content?.[0]?.text||"{}";
    return JSON.parse(txt.replace(/```json|```/g,"").trim());
  }catch(e){
    return {category:"other",urgency:"medium",ward_hint:null,language:"english"};
  }
}

function useLeafletMap(containerId, center, zoom, complaints, filter, onSelectComplaint){
  const mapRef=useRef(null);
  const markersRef=useRef([]);
  const clusterLayersRef=useRef([]);
  const onSelectRef=useRef(onSelectComplaint);
  useEffect(()=>{ onSelectRef.current=onSelectComplaint; },[onSelectComplaint]);

  useEffect(()=>{
    if(mapRef.current) return;
    mapRef.current=L.map(containerId,{zoomControl:false}).setView(center,zoom);
    // CartoDB Positron — clean, light, modern
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
      attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
      subdomains:'abcd', maxZoom:19
    }).addTo(mapRef.current);
    // Custom zoom control bottom-right
    L.control.zoom({position:"bottomright"}).addTo(mapRef.current);
    // Ward health score circles (drawn once on init)
    WARDS.forEach(w=>{
      const col=scoreHex(w.score);
      const fillOp=w.score>=71?0.06:w.score>=41?0.09:0.13;
      L.circle([w.lat,w.lng],{
        radius:1100, fillColor:col, color:col, weight:1.5, fillOpacity:fillOp, dashArray:"5 4",
        interactive:true
      }).bindTooltip(
        `<div style="font-family:'DM Sans',sans-serif;font-size:12px;min-width:160px;padding:2px 0">
          <strong style="font-size:13px">${w.ward_name}</strong><br/>
          MLA: ${w.mla}<br/>
          <span style="color:${col};font-weight:700">Score: ${w.score}/100</span>
        </div>`,{sticky:true, className:"pp-tooltip"}
      ).addTo(mapRef.current);
    });
  },[]);

  useEffect(()=>{
    if(!mapRef.current) return;
    markersRef.current.forEach(m=>m.remove());
    clusterLayersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    clusterLayersRef.current=[];

    const visible=filter==="all"?complaints:complaints.filter(c=>
      filter==="resolved"?c.status==="resolved":c.category===filter
    );

    visible.forEach(c=>{
      const col=c.status==="resolved"?"#1D9E75":catColor(c.category);
      const urgencySize=c.urgency==="high"?10:c.urgency==="medium"?8:6;
      const marker=L.circleMarker([c.lat,c.lng],{
        radius:urgencySize, fillColor:col, color:"#fff", weight:2, fillOpacity:.95
      });
      marker.on("click",()=>{ if(onSelectRef.current) onSelectRef.current(c); });
      marker.addTo(mapRef.current);
      markersRef.current.push(marker);
    });

    // Draw clusters as large bold numbered circles (NammaKasa style)
    const clusters=detectClusters(complaints);
    clusters.forEach(cl=>{
      const size=Math.min(72, 36 + cl.count * 2);
      const fontSize=cl.count>99?14:cl.count>9?16:18;
      const clusterIcon=L.divIcon({
        html:`<div class="pp-cluster" style="width:${size}px;height:${size}px;font-size:${fontSize}px;background:#5C1A1A;border-color:rgba(255,255,255,.65);">${cl.count}</div>`,
        iconSize:[size,size], iconAnchor:[size/2,size/2], className:""
      });
      const clusterMarker=L.marker([cl.center_lat,cl.center_lng],{icon:clusterIcon})
        .bindTooltip(`<b>${cl.count} ${cl.category} complaints</b><br>${cl.alert_message}`,{sticky:true})
        .addTo(mapRef.current);
      const ring=L.circle([cl.center_lat,cl.center_lng],{
        radius:900, fillColor:"#5C1A1A", color:"#5C1A1A", weight:1, fillOpacity:.07
      }).addTo(mapRef.current);
      clusterLayersRef.current.push(clusterMarker,ring);
    });
  },[complaints,filter]);

  return mapRef;
}

// ─── WARD MAP (smaller) ───
function WardMap({complaints, center, zoom}){
  const mapRef=useRef(null);
  const instanceRef=useRef(null);
  useEffect(()=>{
    if(!mapRef.current) return;
    if(instanceRef.current){ instanceRef.current.remove(); }
    instanceRef.current=L.map(mapRef.current,{zoomControl:true}).setView(center,zoom);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'© OpenStreetMap'}).addTo(instanceRef.current);
    complaints.forEach(c=>{
      const col=c.status==="resolved"?"#1D9E75":catColor(c.category);
      L.circleMarker([c.lat,c.lng],{radius:7,fillColor:col,color:"#fff",weight:2,fillOpacity:.9})
       .bindPopup(`<b>${c.category}</b><br>${c.text.substring(0,60)}...`).addTo(instanceRef.current);
    });
    return ()=>{ if(instanceRef.current){ instanceRef.current.remove(); instanceRef.current=null; } };
  },[JSON.stringify(complaints)]);
  return <div ref={mapRef} id="ward-map" />;
}

// ─── COMPLAINT MODAL ───
function ComplaintModal({onClose, onSubmit, apiKey}){
  const [selCat,setSelCat]=useState("");
  const [text,setText]=useState("");
  const [ward,setWard]=useState("");
  const [aiResult,setAiResult]=useState(null);
  const [classifying,setClassifying]=useState(false);
  const [submitted,setSubmitted]=useState(false);
  const [photo,setPhoto]=useState(null); // base64 data URL

  const cats=["water","roads","power","garbage"];

  function handlePhoto(e){
    const file=e.target.files?.[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>setPhoto(ev.target.result);
    reader.readAsDataURL(file);
  }

  async function handleSubmit(){
    if(!text.trim()) return;
    setClassifying(true);
    const res=await classifyComplaint(text,apiKey);
    setAiResult(res);
    setClassifying(false);

    // pick ward from dropdown or AI hint
    const selectedWard=WARDS.find(w=>String(w.ward_number)===ward) ||
      WARDS.find(w=>w.ward_name.toLowerCase().includes((res.ward_hint||"").toLowerCase())) ||
      WARDS[0];

    const newC={
      id:Date.now(),
      text,
      category:selCat||res.category||"other",
      urgency:res.urgency||"medium",
      ward_number:selectedWard.ward_number,
      ward_name:selectedWard.ward_name,
      pincode:selectedWard.pincode,
      lat:selectedWard.lat+(Math.random()-.5)*.004,
      lng:selectedWard.lng+(Math.random()-.5)*.004,
      status:"open",
      timestamp:new Date().toISOString(),
      mla:selectedWard.mla,
      upvotes:0,
      verified:false,
      photo:photo||null,
    };
    onSubmit(newC);
    setSubmitted(true);
  }

  if(submitted) return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:400,textAlign:"center",padding:"40px 30px"}}>
        <div style={{fontSize:48,marginBottom:16}}>✅</div>
        <h2 style={{fontFamily:"Syne",marginBottom:8}}>Complaint Submitted!</h2>
        <p style={{color:"var(--muted)",fontSize:14}}>Your complaint has been logged and will appear on the map shortly.</p>
        {aiResult && <div className="ai-result" style={{textAlign:"left",marginTop:16}}>
          <span className="ai-result-icon">🤖</span>
          <div className="ai-result-detail">
            <strong>AI Classification</strong>
            Category: {aiResult.category} • Urgency: {aiResult.urgency}<br/>
            Language: {aiResult.language}
          </div>
        </div>}
        <button className="btn btn-primary" style={{marginTop:20}} onClick={onClose}>Close</button>
      </div>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <span className="modal-title">Report an Issue</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {!apiKey && <div className="api-key-banner">
            ⚠️ No API key set — AI classification disabled. Set it in the top bar to enable.
          </div>}
          <div className="form-group">
            <label className="form-label">Category</label>
            <div className="cat-grid">
              {cats.map(c=>(
                <button key={c} className={`cat-btn ${selCat===c?`selected-${c}`:""}`} onClick={()=>setSelCat(c)}>
                  <span style={{fontSize:22}}>{catIcon(c)}</span>
                  {c.charAt(0).toUpperCase()+c.slice(1)}
                </button>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Photo (optional)</label>
            <div className="photo-drop">
              <input type="file" accept="image/*" onChange={handlePhoto}/>
              {photo

                : <>
                  <div className="photo-drop-icon">📷</div>
                  <div className="photo-drop-text">Tap to upload a photo of the issue</div>
                </>
              }
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Describe the issue</label>
            <textarea className="form-control" rows={4} value={text} onChange={e=>setText(e.target.value)}
              placeholder="e.g. No water since 3 days, borewell not working near 5th block..."/>
          </div>
          <div className="form-group">
            <label className="form-label">Ward</label>
            <select className="form-control" value={ward} onChange={e=>setWard(e.target.value)}>
              <option value="">-- Select ward --</option>
              {WARDS.map(w=><option key={w.ward_number} value={w.ward_number}>
                Ward {w.ward_number} — {w.ward_name}
              </option>)}
            </select>
          </div>

          {aiResult && !classifying && <div className="ai-result">
            <span className="ai-result-icon">🤖</span>
            <div className="ai-result-detail">
              <strong>AI says: {aiResult.category} — {aiResult.urgency} urgency</strong>
              Ward hint: {aiResult.ward_hint||"none"} • Language: {aiResult.language}
            </div>
          </div>}

          {classifying && <div style={{textAlign:"center",padding:"12px 0",color:"var(--muted)",fontSize:13}}>
            <span className="spinner"/> &nbsp; Claude is classifying your complaint…
          </div>}

          <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",height:44,fontSize:15}}
            onClick={handleSubmit} disabled={classifying||!text.trim()}>
            {classifying?"Classifying…":"Submit Complaint"}
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [complaints,setComplaints]=useState(loadComplaints);

  const [searchResults,setSearchResults]=useState([]);
  const [showModal,setShowModal]=useState(false);
  const [page,setPage]=useState("map"); // map | ward | wards
  const [selectedWard,setSelectedWard]=useState(null);
  const [alertVisible,setAlertVisible]=useState(false);
  const [alertText,setAlertText]=useState("");
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(API_KEY_STORAGE)||"");
  const [keyInput,setKeyInput]=useState("");
  const [showKeyInput,setShowKeyInput]=useState(false);
  const [votedIds,setVotedIds]=useState(()=>JSON.parse(localStorage.getItem("pp_votes")||"[]"));
  const [showLegend,setShowLegend]=useState(true);
  const [selectedComplaint,setSelectedComplaint]=useState(null);

  function handleUpvote(id){
    const alreadyVoted = votedIds.includes(id);
    const updated = complaints.map(c =>
      c.id===id ? {...c, upvotes: c.upvotes + (alreadyVoted ? -1 : 1)} : c
    );
    setComplaints(updated);
    saveComplaints(updated);
    const newVotes = alreadyVoted ? votedIds.filter(v=>v!==id) : [...votedIds, id];
    setVotedIds(newVotes);
    localStorage.setItem("pp_votes", JSON.stringify(newVotes));
  }

  const clusters=detectClusters(complaints);
  useEffect(()=>{
    if(clusters.length>0){
      setAlertText("🚨 "+clusters[0].alert_message);
      setAlertVisible(true);
    }
  },[complaints]);

  // Leaflet map
  const mapRef=useLeafletMap("map",[12.9716,77.5946],12,complaints,filter,setSelectedComplaint);

  // Ward map click
  useEffect(()=>{
    if(!mapRef.current) return;
    const handler=(e)=>{
      // handled via popups
    };
    mapRef.current.on("click",handler);
    return ()=>{ if(mapRef.current) mapRef.current.off("click",handler); };
  },[]);

  function handleSearch(q){
    setSearchQ(q);
    setSearchResults(q.length>=2?searchWards(q,WARDS):[]);
  }
  function handleSearchSelect(w){
    setSearchResults([]);
    setSearchQ("");
    setSelectedWard(w);
    setPage("ward");
  }
  function handleSubmitComplaint(c){
    const updated=[c,...complaints];
    setComplaints(updated);
    saveComplaints(updated);
    // Check for new cluster
    const newClusters=detectClusters(updated);
    if(newClusters.length>0){
      setAlertText("🚨 "+newClusters[0].alert_message);
      setAlertVisible(true);
    }
  }
  function saveApiKey(){
    localStorage.setItem(API_KEY_STORAGE,keyInput);
    setApiKey(keyInput);
    setShowKeyInput(false);
    setKeyInput("");
  }
  function handleReportFromWard(ward){
    setShowModal(true);

  const openComplaints=complaints.filter(c=>c.status==="open").length;
  const resolvedToday=complaints.filter(c=>c.status==="resolved"&&new Date(c.timestamp).toDateString()===new Date().toDateString()).length;

              <circle cx="12" cy="9" r="2.5"/>
            </svg>

            <h1>PrajaPulse</h1>
            <small>ಪ್ರಜಾ ಪಲ್ಸ್</small>
          </div>

          <svg className="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>

                        className={`upvote-btn ${votedIds.includes(c.id)?"voted":""}`}
                        onClick={()=>handleUpvote(c.id)}
                        title={votedIds.includes(c.id)?"Click to remove your vote":"Upvote this issue"}
                        style={{marginLeft:"auto"}}
                      >
                        ▲ {c.upvotes}
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            {/* Why PrajaPulse — pinned to bottom */}
            <div className="why-panel">
              <div className="why-panel-title">Why PrajaPulse</div>
              <div className="why-row"><span className="why-check">✓</span><span>MLA accountability with live score</span></div>
              <div className="why-row"><span className="why-check">✓</span><span>Water, roads, power & garbage — all in one</span></div>
              <div className="why-row"><span className="why-check">✓</span><span>AI classifier supports Kannada & Hinglish</span></div>
              <div className="why-row"><span className="why-check">✓</span><span>Auto-cluster detection, authority alerted</span></div>
              <div className="tagline">"Your ward. Your voice. Their score."</div>
            </div>
          </aside>

          {/* Map */}
          <div className="map-area">
            <div id="map"/>
            {showLegend && (
              <div className="map-legend">
                <div className="legend-title">Ward Health Score</div>
                <div className="legend-row"><div className="legend-swatch" style={{background:"#1D9E75"}}/><span>71–100 · Good</span></div>
                <div className="legend-row"><div className="legend-swatch" style={{background:"#BA7517"}}/><span>41–70 · Needs work</span></div>
                <div className="legend-row"><div className="legend-swatch" style={{background:"#C0392B"}}/><span>0–40 · Poor</span></div>
              </div>
            )}
          </div>

          {/* Complaint Detail Panel */}
          {selectedComplaint && (
            <ComplaintDetailPanel
              complaint={complaints.find(c=>c.id===selectedComplaint.id)||selectedComplaint}
              onClose={()=>setSelectedComplaint(null)}
              onUpvote={handleUpvote}
              votedIds={votedIds}
            />
          )}
        </div>
      )}

      {/* ── WARD PAGE ── */}
      {page==="ward" && selectedWard && (
        <WardPage
          ward={selectedWard}
          complaints={complaints}
          onBack={()=>setPage("map")}
          onReport={handleReportFromWard}
          onUpvote={handleUpvote}
          votedIds={votedIds}
        />
      )}

      {/* ── WARDS PAGE ── */}
      {page==="wards" && (
        <WardsPage
          complaints={complaints}
          onBack={()=>setPage("map")}
          onSelectWard={w=>{setSelectedWard(w);setPage("ward");}}
        />
      )}

      {/* FAB */}
      {page==="map" && (
        <button className="fab" onClick={()=>setShowModal(true)} title="Report Issue">+</button>
      )}

      {/* MODAL */}
      {showModal && (
        <ComplaintModal
          apiKey={apiKey}
          onClose={()=>setShowModal(false)}
          onSubmit={c=>{handleSubmitComplaint(c);setShowModal(false);}}
        />
      )}

    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
